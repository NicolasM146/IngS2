{% extends "layout.html" %}

{% block title %}Actualizar Alquiler{% endblock %}

{% block content %}
<h2>Actualizar Alquiler</h2>

<form method="post" action="{{ url_for('rental.edit', rental_id=alquiler.id) }}">

    <div class="mb-3">
        <label for="price" class="form-label">Precio por noche</label>
        <input type="number" step="0.01" min="0" id="price" name="price" class="form-control"
            value="{{ alquiler.price }}" required>
    </div>

    <div class="mb-3">
        <label for="advance_payment" class="form-label">Pago adelantado</label>
        <select id="advance_payment" name="advance_payment" class="form-select" required>
            <option value="false" {% if not alquiler.advance_payment %}selected{% endif %}>No</option>
            <option value="true" {% if alquiler.advance_payment %}selected{% endif %}>Sí</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Confirmar</button>
    <a href="{{ url_for('rental.index') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
