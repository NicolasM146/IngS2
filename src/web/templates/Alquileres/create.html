{% extends "layout.html" %}

{% block title %}Nuevo Alquiler{% endblock %}

{% block content %}
<h2>Cargar Alquiler</h2>

<form method="post" action="{{ url_for('rental.create') }}">
    <div class="mb-3">
        <label for="property_id" class="form-label">Propiedad</label>
        <select id="property_id" name="property_id" class="form-select" required>
            <option value="" disabled selected>Seleccione un Inmueble</option>
            {% for prop in propiedades %}
            {% if not prop.rental and not prop.estado == 'Dado de baja' %}
            <option value="{{ prop.id }}">{{ prop.direccion }} - {{ prop.localidad }}</option>
            {% endif %}
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="price" class="form-label">Precio por noche</label>
        <input type="number" step="0.01" min="0" id="price" name="price" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="advance_payment" class="form-label">Pago adelantado</label>
        <select id="advance_payment" name="advance_payment" class="form-select" required>
            <option value="false" selected>No</option>
            <option value="true">Sí</option>
        </select>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" value="true" id="has_refund" name="has_refund">
        <label class="form-check-label" for="has_refund">
            Tiene reintegro
        </label>
    </div>


    <button type="submit" class="btn btn-success">Cargar Alquiler</button>
    <a href="{{ url_for('rental.index') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
