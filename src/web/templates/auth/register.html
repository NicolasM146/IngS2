<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Registro de Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carga Stripe.js -->
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-2xl p-8 bg-white shadow-lg rounded-lg">
    <h1 class="text-2xl font-semibold mb-6 text-center text-gray-800">Registrarse</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="mb-4">
          {% for category, message in messages %}
            <li class="mb-2 text-sm px-4 py-2 rounded {{ 'bg-red-100 text-red-800' if category == 'error' else 'bg-green-100 text-green-800' }}">
              {{ message }}
            </li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form id="registration-form" method="POST" action="{{ url_for('register.register') }}" class="space-y-6">

        <fieldset>
            <legend class="text-lg font-medium text-gray-700 mb-4">Datos Personales</legend>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Campos personales igual que antes -->
                <div>
                    <label class="block text-gray-600 text-sm">Nombre:</label>
                    <input type="text" name="nombre" value="{{ datos.nombre if datos else '' }}" required class="w-full mt-1 p-2 border rounded" />
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">DNI:</label>
                    <input type="text" name="dni" value="{{ datos.dni if datos else '' }}" required class="w-full mt-1 p-2 border rounded" />
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">Nacionalidad:</label>
                    <input type="text" name="nacionalidad" value="{{ datos.nacionalidad if datos else '' }}" required class="w-full mt-1 p-2 border rounded" />
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">Email:</label>
                    <input type="email" name="email" value="{{ datos.email if datos else '' }}" required class="w-full mt-1 p-2 border rounded" />
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">Teléfono:</label>
                    <input type="text" name="telefono" value="{{ datos.telefono if datos else '' }}" required class="w-full mt-1 p-2 border rounded" />
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">Fecha de Nacimiento:</label>
                    <input type="date" name="fecha_nacimiento" value="{{ datos.fecha_nacimiento if datos else '' }}" required class="w-full mt-1 p-2 border rounded" />
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">Nombre de Usuario:</label>
                    <input type="text" name="username" value="{{ datos.username if datos else '' }}" required class="w-full mt-1 p-2 border rounded" />
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">Contraseña:</label>
                    <input type="password" name="password" required class="w-full mt-1 p-2 border rounded" />
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend class="text-lg font-medium text-gray-700 mb-4">Datos de Tarjeta</legend>

            <!-- Aquí insertamos Stripe Elements -->
            <div id="card-element" class="p-3 border rounded bg-white"></div>
            <div id="card-errors" role="alert" class="text-red-600 mt-2"></div>
        </fieldset>

        <div class="text-center">
            <button id="submit-button" type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                Registrarse
            </button>
        </div>
    </form>
</div>

<script>
    // Reemplaza con tu clave pública de Stripe (pública)
    const stripe = Stripe("{{ stripe_public_key }}");

    const elements = stripe.elements();
    const cardElement = elements.create("card", {
        style: {
            base: {
                fontSize: '16px',
                color: '#32325d',
                '::placeholder': { color: '#a0aec0' },
            },
            invalid: { color: '#fa755a' }
        }
    });
    cardElement.mount("#card-element");

    const form = document.getElementById("registration-form");
    const submitButton = document.getElementById("submit-button");
    const cardErrors = document.getElementById("card-errors");

    form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        cardErrors.textContent = "";

        const { paymentMethod, error } = await stripe.createPaymentMethod({
            type: "card",
            card: cardElement,
        });

        if (error) {
            cardErrors.textContent = error.message;
            submitButton.disabled = false;
        } else {
            // Creamos un input hidden para mandar el paymentMethod.id al backend
            const hiddenInput = document.createElement("input");
            hiddenInput.type = "hidden";
            hiddenInput.name = "payment_method_id";
            hiddenInput.value = paymentMethod.id;
            form.appendChild(hiddenInput);

            // Ahora sí enviamos el formulario
            form.submit();
        }
    });
</script>

</body>
</html>
